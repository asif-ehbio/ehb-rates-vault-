<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASIF SHOP | Ultimate Service Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ffcc; --bg: #05070a; --card: #12151c; --text: #d1d5db; --font-bn: 'Hind Siliguri', sans-serif; --font-en: 'Orbitron', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-bn); padding-bottom: 120px; }
        
        /* 💡 Glowing ASIF SHOP Header */
        header { text-align: center; padding: 60px 20px; background: radial-gradient(circle at top, #002b24 0%, var(--bg) 90%); border-bottom: 1px solid #1f2937; }
        header h1 { font-family: var(--font-en); color: var(--accent); font-size: 32px; margin: 0; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
        header p { font-size: 13px; opacity: 0.7; margin-top: 10px; letter-spacing: 1px; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .section-title { font-weight: 700; margin: 35px 0 15px; padding-left: 5px; font-size: 16px; color: var(--accent); text-transform: uppercase; display: flex; align-items: center; gap: 10px; }

        /* 💠 Quick Service Grid */
        .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 25px 0; }
        .service-card { background: var(--card); border: 1px solid #30363d; border-radius: 15px; padding: 20px 5px; text-align: center; cursor: pointer; transition: 0.3s; }
        .service-card:active { transform: scale(0.95); background: #1c2128; border-color: var(--accent); }
        .service-card i { font-size: 32px; margin-bottom: 12px; display: block; }
        .service-card b { font-size: 10px; color: #fff; display: block; text-transform: uppercase; line-height: 1.3; }

        /* 📊 List Item Style (Icon + Text) */
        .rate-row { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #2d333b; }
        .rate-row i { font-size: 25px; color: var(--accent); width: 35px; text-align: center; }
        .rate-info b { display: block; font-size: 16px; color: #fff; margin-bottom: 4px; }
        .rate-info span { font-size: 14px; color: var(--accent); font-weight: 800; }
        .order-btn { margin-left: auto; background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 800; font-size: 12px; cursor: pointer; }

        /* 📞 Contact Buttons */
        .contact-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .contact-btn { background: #fff; color: #000; padding: 12px; border-radius: 10px; text-align: center; text-decoration: none; font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* 🛠️ CEO Admin Panel */
        #admin-panel { display: none; background: #0a0a0a; border-top: 2px solid var(--accent); padding: 25px; position: fixed; bottom: 0; left: 0; width: 100%; box-sizing: border-box; z-index: 2000; border-radius: 20px 20px 0 0; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .admin-trigger { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.6); }

        footer { text-align: center; padding: 40px 20px; font-size: 12px; opacity: 0.5; border-top: 1px solid #1f2937; margin-top: 40px; }
    </style>
</head>
<body>

</html>
