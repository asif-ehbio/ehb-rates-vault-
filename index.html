<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | Pro Service & Reviews v3.3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --bg: #0a0a0a; --card: #151515; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 120px; }
        
        /* 📢 English Notice Banner */
        .notice-banner { background: rgba(255,0,0,0.15); border-bottom: 1px solid #ff3b30; padding: 12px; text-align: center; font-weight: 600; color: #ff3b30; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

        header { text-align: center; padding: 35px 20px; background: linear-gradient(180deg, #111 0%, var(--bg) 100%); }
        header h1 { color: var(--accent); margin: 0; font-size: 24px; letter-spacing: 2px; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .section-title { color: var(--accent); font-size: 17px; margin: 30px 0 15px 5px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 10px; border-left: 3px solid var(--accent); padding-left: 10px; }

        /* 📸 Review Card Styles */
        .review-card { background: var(--card); border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid #222; }
        .review-img { width: 100%; display: block; border-bottom: 1px solid #222; }
        .review-caption { padding: 15px; font-size: 14px; color: #bbb; line-height: 1.5; }
        .review-date { font-size: 11px; color: var(--accent); opacity: 0.7; padding: 0 15px 15px; }

        /* 💰 Service Cards */
        .service-card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .service-info b { display: block; font-size: 16px; color: #fff; margin-bottom: 4px; }
        .service-info span { font-size: 14px; color: var(--accent); font-weight: 700; }
        
        .order-btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        
        /* 🛠️ CEO Admin Panel */
        #admin-panel { display: none; background: #111; border: 2px solid var(--accent); padding: 20px; border-radius: 20px; margin-top: 30px; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .admin-btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .admin-trigger { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: var(--accent); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="notice-banner">
        <i class="fas fa-exclamation-triangle"></i> We do not conduct Admin Deals. Our services are 100% successful.
    </div>

    <header>
        <h1>EHB SERVICE VAULT</h1>
        <p style="font-size:12px; opacity:0.6;">Cyber Security & Trusted Media Recovery</p>
    </header>

    <div class="container">
        <div class="section-title"><i class="fas fa-tags"></i> সার্ভিস রেট তালিকা</div>
        <div id="rate-list"></div>

        <div class="section-title"><i class="fas fa-star"></i> কাস্টমার রিভিউ</div>
        <div id="review-list"></div>
        
        <div id="admin-panel">
            <h3 style="color:var(--accent); text-align:center;">CEO অ্যাডমিন ড্যাশবোর্ড</h3>
            
            <div style="border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <label style="color:var(--accent); display:block; margin-bottom:10px;">রিভিউ আপলোড (ছবি):</label>
                <input type="file" id="rev-img" class="admin-input" accept="image/*">
                <textarea id="rev-cap" class="admin-input" placeholder="রিভিউ ক্যাপশন লিখুন..." rows="2"></textarea>
                <button class="admin-btn" onclick="addReview()">রিভিউ পাবলিশ করুন</button>
            </div>

            <label>নতুন সার্ভিস যোগ করুন:</label>
            <input type="text" id="cat-input" class="admin-input" placeholder="ক্যাটাগরি (যেমন: FACEBOOK)">
            <input type="text" id="name-input" class="admin-input" placeholder="সার্ভিসের নাম">
            <input type="text" id="price-input" class="admin-input" placeholder="সার্ভিসের দাম">
            <button class="admin-btn" onclick="addService()">সার্ভিস যোগ করুন</button>

            <button class="admin-btn" style="background:#ff3b30; color:#fff; margin-top:20px;" onclick="resetData()">সব ডাটা রিসেট করুন</button>
        </div>
    </div>

    <div class="admin-trigger" onclick="toggleAdmin()"><i class="fas fa-user-shield" style="font-size: 22px;"></i></div>

    <script>
        // Full Service List Restore
        const defaultData = {
            services: [
                { cat: "TELEGRAM", name: "Scam Removal", price: "17,000/-" },
                { cat: "TELEGRAM", name: "Custom Bot", price: "3,000/-" },
                { cat: "TELEGRAM", name: "API Setup", price: "2,500/-" },
                { cat: "INSTAGRAM", name: "Permanent Remove", price: "37,000/-" },
                { cat: "INSTAGRAM", name: "Suspended Recovery", price: "1,400/-" },
                { cat: "INSTAGRAM", name: "Meta Verify", price: "1,000/-" },
                { cat: "FACEBOOK", name: "Locked Recovery", price: "1,500/-" },
                { cat: "FACEBOOK", name: "Hacked Recovery", price: "18,000/-" },
                { cat: "FACEBOOK", name: "Imposter (With DOB)", price: "500/-" },
                { cat: "FACEBOOK", name: "Imposter (Without DOB)", price: "900/-" },
                { cat: "FACEBOOK", name: "Meta Verify", price: "700/-" },
                { cat: "GMAIL & SERVER", name: "Disabled Fix", price: "2,000/-" },
                { cat: "GMAIL & SERVER", name: "2FA Bypass", price: "2,500/-" },
                { cat: "GMAIL & SERVER", name: "Server Fix", price: "3,000/-" },
                { cat: "METHODS & UPDATES", name: "Copyright Update", price: "600/-" },
                { cat: "METHODS & UPDATES", name: "Telegram Banning", price: "3,200/-" },
                { cat: "METHODS & UPDATES", name: "WhatsApp Banning", price: "5,700/-" },
                { cat: "IMPOSTER FILES", name: "Dob File", price: "1,000/-" },
                { cat: "IMPOSTER FILES", name: "Without Dob File", price: "1,500/-" },
                { cat: "BOT REPORTS", name: "Telegram Bot", price: "3 Lakh" },
                { cat: "BOT REPORTS", name: "Instagram Bot", price: "7 Lakh" },
                { cat: "BOT REPORTS", name: "Facebook Bot", price: "1.3 Million" }
            ],
            reviews: []
        };

        let ehbData = JSON.parse(localStorage.getItem('ehbVaultV33')) || defaultData;

        function renderSite() {
            const rateList = document.getElementById('rate-list');
            rateList.innerHTML = '';
            const grouped = {};
            ehbData.services.forEach(s => {
                if(!grouped[s.cat]) grouped[s.cat] = [];
                grouped[s.cat].push(s);
            });
            for(let cat in grouped) {
                rateList.innerHTML += `<div style="font-size:13px; color:var(--accent); margin:18px 0 10px; font-weight:bold; letter-spacing:1px;">${cat} RATE</div>`;
                grouped[cat].forEach(item => {
                    rateList.innerHTML += `
                    <div class="service-card">
                        <div class="service-info"><b>${item.name}</b><span>${item.price}</span></div>
                        <button class="order-btn" onclick="order('${cat}', '${item.name}', '${item.price}')">অর্ডার</button>
                    </div>`;
                });
            }

            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = ehbData.reviews.length ? '' : '<p style="text-align:center; opacity:0.4; font-size:14px;">এখনো কোনো রিভিউ পাবলিশ করা হয়নি।</p>';
            ehbData.reviews.slice().reverse().forEach(rev => {
                reviewList.innerHTML += `
                <div class="review-card">
                    <img src="${rev.img}" class="review-img">
                    <div class="review-caption">${rev.caption}</div>
                    <div class="review-date">সফল পেমেন্ট প্রুফ - ${rev.date}</div>
                </div>`;
            });
        }

        function toggleAdmin() {
            if(prompt("CEO পাসওয়ার্ড দিন:") === "asif2008") {
                const p = document.getElementById('admin-panel');
                p.style.display = p.style.display === 'block' ? 'none' : 'block';
                window.scrollTo(0, document.body.scrollHeight);
            } else { alert("এক্সেস ডিনাইড!"); }
        }

        function addService() {
            const cat = document.getElementById('cat-input').value.toUpperCase();
            const name = document.getElementById('name-input').value;
            const price = document.getElementById('price-input').value;
            if(cat && name && price) {
                ehbData.services.push({ cat, name, price });
                saveAndRender();
            }
        }

        function addReview() {
            const file = document.getElementById('rev-img').files[0];
            const caption = document.getElementById('rev-cap').value;
            if(!file || !caption) return alert("ছবি এবং ক্যাপশন উভয়ই দিন!");
            const reader = new FileReader();
            reader.onload = (e) => {
                ehbData.reviews.push({ img: e.target.result, caption, date: new Date().toLocaleDateString('en-GB') });
                saveAndRender();
            };
            reader.readAsDataURL(file);
        }

        function saveAndRender() {
            localStorage.setItem('ehbVaultV33', JSON.stringify(ehbData));
            renderSite();
            alert("সফলভাবে আপডেট হয়েছে!");
        }

        function order(cat, name, price) {
            window.open(`https://wa.me/8801816731602?text=সার্ভিস: ${cat}\nনাম: ${name}\nদাম: ${price}`, '_blank');
        }

        function resetData() { if(confirm("সব ডাটা কি রিসেট করবেন?")) { localStorage.removeItem('ehbVaultV33'); location.reload(); } }

        renderSite();
    </script>
</body>
</html>
