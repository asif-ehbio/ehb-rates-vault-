<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | CEO Admin Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --bg: #0a0a0a; --card: #151515; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 100px; }
        
        header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, #111 0%, var(--bg) 100%); border-bottom: 1px solid #333; }
        header h1 { color: var(--accent); margin: 0; font-size: 24px; letter-spacing: 2px; }
        
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .category-title { color: var(--accent); font-size: 16px; margin: 25px 0 15px 5px; font-weight: 700; text-transform: uppercase; }
        
        .service-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .service-info b { display: block; font-size: 15px; color: #fff; }
        .service-info span { font-size: 14px; color: var(--accent); font-weight: 600; }
        
        .order-btn { background: var(--accent); color: #000; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .note-box { background: rgba(255, 204, 0, 0.1); border: 1px dashed #ffcc00; padding: 15px; border-radius: 10px; margin-top: 30px; color: #ffcc00; }

        /* 🔒 ADMIN DASHBOARD CSS */
        #admin-panel { display: none; background: #111; border: 2px solid var(--accent); padding: 20px; border-radius: 15px; margin-top: 30px; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .admin-btn { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        .admin-trigger { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--accent); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

    <header>
        <h1>EHB SERVICE VAULT</h1>
        <p>Managed by CEO Asif Chowdhury</p>
    </header>

    <div class="container" id="main-content">
        <div id="rate-list"></div>
        <div id="note-display" class="note-box"></div>
        
        <div id="admin-panel">
            <h3 style="color:var(--accent); text-align:center;">CEO DASHBOARD</h3>
            <label>নোট পরিবর্তন করুন:</label>
            <textarea id="note-input" class="admin-input" rows="3"></textarea>
            
            <hr style="border:0.5px solid #333; margin: 20px 0;">
            
            <label>নতুন সার্ভিস যোগ করুন:</label>
            <input type="text" id="cat-input" class="admin-input" placeholder="ক্যাটাগরি (যেমন: Instagram)">
            <input type="text" id="name-input" class="admin-input" placeholder="সার্ভিসের নাম">
            <input type="text" id="price-input" class="admin-input" placeholder="দাম (যেমন: 500/-)">
            
            <button class="admin-btn" onclick="updateSite()">সাইট আপডেট করুন</button>
            <button class="admin-btn" style="background:#ff3b30; color:#fff;" onclick="resetData()">সব ডাটা মুছুন</button>
        </div>
    </div>

    <div class="admin-trigger" onclick="toggleAdmin()"><i class="fas fa-user-shield"></i></div>

    <script>
        // Default Data
        let ehbData = JSON.parse(localStorage.getItem('ehbVaultData')) || {
            note: "⚠️ বিশেষ দ্রষ্টব্য: ইম্পোস্টার ফাইল সেলের রেট ফিক্সড। কোনো প্রকার দরদাম বা বারগেইন করা যাবে না।",
            services: [
                { cat: "TELEGRAM", name: "Scam Removal", price: "17,000/-" },
                { cat: "INSTAGRAM", name: "Suspended Fix", price: "1,400/-" }
            ]
        };

        function renderSite() {
            const listDiv = document.getElementById('rate-list');
            const noteDiv = document.getElementById('note-display');
            listDiv.innerHTML = '';
            
            // Group services by category
            const grouped = {};
            ehbData.services.forEach(s => {
                if(!grouped[s.cat]) grouped[s.cat] = [];
                grouped[s.cat].push(s);
            });

            for(let cat in grouped) {
                listDiv.innerHTML += `<div class="category-title">${cat} RATE</div>`;
                grouped[cat].forEach(item => {
                    listDiv.innerHTML += `
                    <div class="service-card">
                        <div class="service-info"><b>${item.name}</b><span>${item.price}</span></div>
                        <button class="order-btn" onclick="order('${cat}', '${item.name}', '${item.price}')">Order</button>
                    </div>`;
                });
            }
            noteDiv.innerText = ehbData.note;
            document.getElementById('note-input').value = ehbData.note;
        }

        function toggleAdmin() {
            const pass = prompt("CEO পাসওয়ার্ড দিন:");
            if(pass === "asif2008") {
                const panel = document.getElementById('admin-panel');
                panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
                window.scrollTo(0, document.body.scrollHeight);
            } else { alert("ACCESS DENIED!"); }
        }

        function updateSite() {
            const newNote = document.getElementById('note-input').value;
            const newCat = document.getElementById('cat-input').value.toUpperCase();
            const newName = document.getElementById('name-input').value;
            const newPrice = document.getElementById('price-input').value;

            if(newCat && newName && newPrice) {
                ehbData.services.push({ cat: newCat, name: newName, price: newPrice });
            }
            ehbData.note = newNote;
            
            localStorage.setItem('ehbVaultData', JSON.stringify(ehbData));
            renderSite();
            alert("সাইট সফলভাবে আপডেট হয়েছে! (Local Storage)");
        }

        function resetData() {
            if(confirm("সব ডাটা মুছে যাবে। আপনি কি নিশ্চিত?")) {
                localStorage.removeItem('ehbVaultData');
                location.reload();
            }
        }

        function order(cat, name, price) {
            const msg = `SERVICE: ${cat}\nNAME: ${name}\nPRICE: ${price}`;
            window.open(`https://wa.me/8801816731602?text=${encodeURIComponent(msg)}`, '_blank');
        }

        renderSite();
    </script>
</body>
</html>
