<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | Complete Service Vault v3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --bg: #0a0a0a; --card: #151515; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 120px; }
        header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, #111 0%, var(--bg) 100%); border-bottom: 1px solid #333; }
        header h1 { color: var(--accent); margin: 0; font-size: 24px; letter-spacing: 2px; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .category-title { color: var(--accent); font-size: 16px; margin: 30px 0 15px 5px; font-weight: 700; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 10px; }
        .service-card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .service-info b { display: block; font-size: 16px; color: #fff; margin-bottom: 5px; }
        .service-info span { font-size: 14px; color: var(--accent); font-weight: 700; }
        .order-btn { background: var(--accent); color: #000; border: none; padding: 10px 22px; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .note-box { background: rgba(255, 204, 0, 0.05); border: 1px dashed #ffcc00; padding: 20px; border-radius: 15px; margin-top: 40px; color: #ffcc00; font-size: 14px; line-height: 1.6; }
        #admin-panel { display: none; background: #111; border: 2px solid var(--accent); padding: 20px; border-radius: 20px; margin-top: 30px; box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .admin-btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 8px; }
        .admin-trigger { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: var(--accent); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <h1>EHB SERVICE VAULT</h1>
        <p>Cyber Security & Media Recovery Hub</p>
    </header>

    <div class="container" id="main-content">
        <div id="rate-list"></div>
        <div id="note-display" class="note-box"></div>
        
        <div id="admin-panel">
            <h3 style="color:var(--accent); text-align:center; text-transform:uppercase;">CEO Admin Control</h3>
            <label>নোট আপডেট করুন:</label>
            <textarea id="note-input" class="admin-input" rows="3"></textarea>
            <hr style="border:0.5px solid #333; margin: 20px 0;">
            <label>নতুন সার্ভিস যোগ করুন:</label>
            <input type="text" id="cat-input" class="admin-input" placeholder="ক্যাটাগরি (যেমন: FACEBOOK)">
            <input type="text" id="name-input" class="admin-input" placeholder="সার্ভিসের নাম">
            <input type="text" id="price-input" class="admin-input" placeholder="দাম (যেমন: 500/-)">
            <button class="admin-btn" onclick="updateSite()">সেভ এবং আপডেট করুন</button>
            <button class="admin-btn" style="background:#ff3b30; color:#fff;" onclick="resetData()">ডিফল্ট ডাটা রিসেট করুন</button>
        </div>
    </div>

    <div class="admin-trigger" onclick="toggleAdmin()"><i class="fas fa-user-shield" style="font-size: 22px;"></i></div>

    <script>
        // Restored All Service Data
        const defaultData = {
            note: "⚠️ বিশেষ দ্রষ্টব্য: ইম্পোস্টার ফাইল সেলের রেট ফিক্সড। কোনো প্রকার দরদাম বা বারগেইন করা যাবে না। আমাদের সেবাগুলো দ্রুত এবং বিশ্বস্ত।",
            services: [
                { cat: "TELEGRAM", name: "Scam Removal", price: "17,000/-" },
                { cat: "TELEGRAM", name: "Custom Bot", price: "3,000/-" },
                { cat: "TELEGRAM", name: "API Setup", price: "2,500/-" },
                { cat: "INSTAGRAM", name: "Permanent Remove", price: "37,000/-" },
                { cat: "INSTAGRAM", name: "Suspended Recovery", price: "1,400/-" },
                { cat: "INSTAGRAM", name: "Meta Verify", price: "1,000/-" },
                { cat: "FACEBOOK", name: "Locked Recovery", price: "1,500/-" },
                { cat: "FACEBOOK", name: "Hacked Recovery", price: "18,000/-" },
                { cat: "FACEBOOK", name: "Imposter (With DOB)", price: "500/-" },
                { cat: "FACEBOOK", name: "Imposter (Without DOB)", price: "900/-" },
                { cat: "FACEBOOK", name: "Meta Verify", price: "700/-" },
                { cat: "GMAIL & SERVER", name: "Disabled Fix", price: "2,000/-" },
                { cat: "GMAIL & SERVER", name: "2FA Bypass", price: "2,500/-" },
                { cat: "GMAIL & SERVER", name: "Server Fix", price: "3,000/-" },
                { cat: "METHODS & UPDATES", name: "Copyright Update", price: "600/-" },
                { cat: "METHODS & UPDATES", name: "Teligram Banning", price: "3,200/-" },
                { cat: "METHODS & UPDATES", name: "Whatsapp Banning", price: "5,700/-" },
                { cat: "METHODS & UPDATES", name: "Instagram Banning PDF", price: "800/-" },
                { cat: "IMPOSTER FILES", name: "Dob File", price: "1,000/-" },
                { cat: "IMPOSTER FILES", name: "Without Dob File", price: "1,500/-" },
                { cat: "BOT REPORTS", name: "Telegram Report (3L)", price: "3 Lakh" },
                { cat: "BOT REPORTS", name: "Instagram Report (7L)", price: "7 Lakh" },
                { cat: "BOT REPORTS", name: "Facebook Bot (1.3M)", price: "1.3 Million" },
                { cat: "UPDATE SELL", name: "Indian Grievance FB", price: "1,500/-" },
                { cat: "UPDATE SELL", name: "Indian Grievance IG", price: "1,500/-" },
                { cat: "UPDATE SELL", name: "Any Other Update", price: "2,000/-" }
            ]
        };

        let ehbData = JSON.parse(localStorage.getItem('ehbVaultDataV3')) || defaultData;

        function renderSite() {
            const listDiv = document.getElementById('rate-list');
            const noteDiv = document.getElementById('note-display');
            listDiv.innerHTML = '';
            
            const grouped = {};
            ehbData.services.forEach(s => {
                if(!grouped[s.cat]) grouped[s.cat] = [];
                grouped[s.cat].push(s);
            });

            for(let cat in grouped) {
                listDiv.innerHTML += `<div class="category-title">${cat} RATE</div>`;
                grouped[cat].forEach(item => {
                    listDiv.innerHTML += `
                    <div class="service-card">
                        <div class="service-info"><b>${item.name}</b><span>${item.price}</span></div>
                        <button class="order-btn" onclick="order('${cat}', '${item.name}', '${item.price}')">Order</button>
                    </div>`;
                });
            }
            noteDiv.innerText = ehbData.note;
            document.getElementById('note-input').value = ehbData.note;
        }

        function toggleAdmin() {
            const pass = prompt("CEO এক্সেস কোড দিন:");
            if(pass === "asif2008") {
                const panel = document.getElementById('admin-panel');
                panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
                window.scrollTo(0, document.body.scrollHeight);
            } else { alert("ACCESS DENIED!"); }
        }

        function updateSite() {
            const newNote = document.getElementById('note-input').value;
            const newCat = document.getElementById('cat-input').value.toUpperCase();
            const newName = document.getElementById('name-input').value;
            const newPrice = document.getElementById('price-input').value;

            if(newCat && newName && newPrice) {
                ehbData.services.push({ cat: newCat, name: newName, price: newPrice });
                document.getElementById('cat-input').value = '';
                document.getElementById('name-input').value = '';
                document.getElementById('price-input').value = '';
            }
            ehbData.note = newNote;
            localStorage.setItem('ehbVaultDataV3', JSON.stringify(ehbData));
            renderSite();
            alert("সফলভাবে আপডেট হয়েছে!");
        }

        function resetData() {
            if(confirm("আপনি কি সব ডিফল্ট ডাটা ফিরিয়ে আনতে চান?")) {
                localStorage.removeItem('ehbVaultDataV3');
                location.reload();
            }
        }

        function order(cat, name, price) {
            const msg = `SERVICE: ${cat}\nNAME: ${name}\nPRICE: ${price}`;
            window.open(`https://wa.me/8801816731602?text=${encodeURIComponent(msg)}`, '_blank');
        }

        renderSite();
    </script>
</body>
</html>
