<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | Professional Service Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --bg: #050505; --card: #111; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        
        /* 🎨 Professional Header with Logo */
        header { text-align: center; padding: 50px 20px; background: linear-gradient(180deg, #001a14 0%, var(--bg) 100%); border-bottom: 1px solid #222; }
        .logo-container { width: 100px; height: 100px; margin: 0 auto 20px; border: 2px solid var(--accent); border-radius: 50%; padding: 5px; box-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .logo-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        header h1 { color: var(--accent); font-size: 28px; margin: 0; letter-spacing: 3px; text-transform: uppercase; }
        header p { font-size: 14px; opacity: 0.6; margin-top: 5px; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        
        /* 🔍 Search Bar */
        .search-box { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 25px; box-sizing: border-box; }

        .category-title { color: var(--accent); font-size: 16px; margin: 35px 0 15px; font-weight: 700; text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 12px; }
        
        /* 💳 Service Cards */
        .service-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; transition: 0.3s; }
        .service-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .service-info b { display: block; font-size: 17px; color: #fff; margin-bottom: 5px; }
        .service-info span { font-size: 15px; color: var(--accent); font-weight: 800; }
        
        .order-btn { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 13px; }

        .admin-trigger { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://via.placeholder.com/100/000000/00ffcc?text=EHB" alt="EHB Logo">
        </div>
        <h1>EHB VAULT PRO</h1>
        <p>Cyber Security & Media Recovery Expert</p>
    </header>

    <div class="container">
        <input type="text" class="search-box" placeholder="সার্ভিস খুঁজুন..." onkeyup="searchService()">

        <div id="rate-list">
            </div>
    </div>

    <div class="admin-trigger" onclick="toggleAdmin()"><i class="fas fa-user-shield"></i></div>

    <script>
        const serviceData = [
            { cat: "TELEGRAM", name: "Scam Removal", price: "17,000/-" },
            { cat: "INSTAGRAM", name: "Permanent Remove", price: "37,000/-" },
            { cat: "FACEBOOK", name: "Hacked Recovery", price: "18,000/-" },
            { cat: "GMAIL & SERVER", name: "Disabled Fix", price: "2,000/-" },
            { cat: "METHODS & UPDATES", name: "Copyright Update", price: "600/-" },
            { cat: "BOT REPORTS", name: "Telegram Bot (3L)", price: "3 Lakh" }
        ];

        function renderSite(data = serviceData) {
            const listDiv = document.getElementById('rate-list');
            listDiv.innerHTML = '';
            const grouped = {};
            data.forEach(s => {
                if(!grouped[s.cat]) grouped[s.cat] = [];
                grouped[s.cat].push(s);
            });

            for(let cat in grouped) {
                listDiv.innerHTML += `<div class="category-title">${cat} SERVICE</div>`;
                grouped[cat].forEach(item => {
                    listDiv.innerHTML += `
                    <div class="service-card">
                        <div class="service-info"><b>${item.name}</b><span>${item.price}</span></div>
                        <button class="order-btn" onclick="order('${item.name}', '${item.price}')">অর্ডার</button>
                    </div>`;
                });
            }
        }

        function searchService() {
            const term = document.querySelector('.search-box').value.toLowerCase();
            const filtered = serviceData.filter(s => s.name.toLowerCase().includes(term) || s.cat.toLowerCase().includes(term));
            renderSite(filtered);
        }

        function toggleAdmin() {
            if(prompt("CEO এক্সেস কোড দিন:") === "asif2008") {
                alert("স্বাগতম আসিফ চৌধুরী! আপনি এখন অ্যাডমিন কন্ট্রোল ব্যবহার করতে পারেন।");
            }
        }

        function order(name, price) {
            window.open(`https://wa.me/8801751416755?text=আসসালামু আলাইকুম,\nআমি আপনার ${name} সার্ভিসটি নিতে চাই। সার্ভিস রেট: ${price}`, '_blank');
        }

        renderSite();
    </script>
</body>
</html>
