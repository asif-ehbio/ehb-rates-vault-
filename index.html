<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASIF SHOP | CEO Management Vault v5.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ffcc; --bg: #05070a; --card: #12151c; --text: #d1d5db; --font-bn: 'Hind Siliguri', sans-serif; --font-en: 'Orbitron', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-bn); padding-bottom: 120px; }
        
        /* 💡 Glowing ASIF SHOP Header */
        header { text-align: center; padding: 60px 20px; background: radial-gradient(circle at top, #002b24 0%, var(--bg) 90%); border-bottom: 1px solid #1f2937; }
        .logo-box { width: 100px; height: 100px; margin: 0 auto 15px; border: 2px solid var(--accent); border-radius: 50%; padding: 5px; box-shadow: 0 0 25px var(--accent); overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        header h1 { font-family: var(--font-en); color: var(--accent); font-size: 32px; margin: 0; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px var(--accent); }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .section-title { font-weight: 700; margin: 30px 0 15px; padding-left: 5px; font-size: 16px; color: var(--accent); text-transform: uppercase; display: flex; align-items: center; gap: 10px; }

        /* 💠 Quick Selection Grid */
        .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .service-card { background: var(--card); border: 1px solid #30363d; border-radius: 15px; padding: 18px 5px; text-align: center; cursor: pointer; }
        .service-card i { font-size: 30px; margin-bottom: 10px; display: block; }
        .service-card b { font-size: 10px; color: #fff; display: block; text-transform: uppercase; }

        /* 📊 List Items */
        .rate-row { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #2d333b; }
        .rate-row i { font-size: 22px; color: var(--accent); width: 30px; text-align: center; }
        .rate-info b { display: block; font-size: 15px; color: #fff; margin-bottom: 2px; }
        .rate-info span { font-size: 13px; color: var(--accent); font-weight: 800; }
        .order-btn { margin-left: auto; background: var(--accent); color: #000; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 800; font-size: 11px; cursor: pointer; }

        /* 🛠️ CEO Admin Panel */
        #admin-panel { display: none; background: #080808; border-top: 3px solid var(--accent); padding: 20px; position: fixed; bottom: 0; left: 0; width: 100%; box-sizing: border-box; z-index: 2000; border-radius: 25px 25px 0 0; max-height: 80vh; overflow-y: auto; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 13px; }
        .admin-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 10px; font-weight: 800; margin-bottom: 10px; cursor: pointer; }
        .price-edit-row { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 8px 12px; margin-bottom: 5px; border-radius: 6px; font-size: 12px; }
        .price-edit-row input { width: 80px; background: #000; border: 1px solid #444; color: var(--accent); text-align: center; padding: 5px; border-radius: 4px; }

        .admin-trigger { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.6); }

        footer { text-align: center; padding: 40px 20px; font-size: 11px; opacity: 0.5; border-top: 1px solid #1f2937; margin-top: 40px; line-height: 1.8; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box"><img src="logo.jpg" alt="Logo"></div> <h1>ASIF SHOP</h1>
        <p>Cyber Security & Media Recovery Hub</p>
    </header>

    <div class="container">

        <div id="full-list"></div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <a href="https://wa.me/8801816731602" style="background:#25d366; color:#fff; padding:12px; border-radius:10px; text-align:center; text-decoration:none; font-weight:800; font-size:12px;"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="https://www.facebook.com/share/1auxodR9MK/" style="background:#1877f2; color:#fff; padding:12px; border-radius:10px; text-align:center; text-decoration:none; font-weight:800; font-size:12px;"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://m.me/186189464570441" style="background:#0084ff; color:#fff; padding:12px; border-radius:10px; text-align:center; text-decoration:none; font-weight:800; font-size:12px;"><i class="fab fa-messenger"></i> Messenger</a>
            <a href="mailto:ethicalhacker.bd.official@gmail.com" style="background:#ea4335; color:#fff; padding:12px; border-radius:10px; text-align:center; text-decoration:none; font-weight:800; font-size:12px;"><i class="fas fa-envelope"></i> Email</a>
        </div>
    </div>

    <div id="admin-panel">
        <h3 style="color:var(--accent); text-align:center; margin-bottom:15px; font-family:var(--font-en);">CEO ADMIN PANEL</h3>
        
        <div id="price-editor-list" style="margin-bottom:20px;">
            </div>

        <button class="admin-btn" style="background:#007bff; color:#fff;" onclick="copyUpdatedScript()">কোড কপি করুন (GitHub Update)</button>
        <button class="admin-btn" style="background:none; border:1px solid #444; color:#666;" onclick="toggleAdmin()">প্যানেল বন্ধ করুন</button>
    </div>

    <div class="admin-trigger" onclick="toggleAdmin()"><i class="fas fa-user-shield"></i></div>

    <footer>
        <i class="fas fa-shield-halved"></i> WE DO NOT ASK FOR ADMIN DEALS.<br>
        Powered by Asif Chowdhury<br>
        &copy; 2026 ASIF SHOP | ALL RIGHTS RESERVED
    </footer>

    <script id="data-script">
        // 📊 Persistence Data
        const serviceGroups = [
            { cat: "✈️ Telegram Rate", items: [
                { icon: "fab fa-telegram", name: "Scam Removal", price: "17,000/-" },
                { icon: "fas fa-robot", name: "Custom Bot", price: "3,000/-" },
                { icon: "fas fa-code", name: "API Setup", price: "2,500/-" }
            ]},
            { cat: "🔸 Instagram Rate", items: [
                { icon: "fab fa-instagram", name: "Permanent Remove", price: "37,000/-" },
                { icon: "fas fa-user-slash", name: "Suspended Fix", price: "1,400/-" },
                { icon: "fas fa-check-circle", name: "Meta Verify", price: "1,000/-" }
            ]},
            { cat: "🔹 Facebook Rate", items: [
                { icon: "fab fa-facebook", name: "Locked Recovery", price: "1,500/-" },
                { icon: "fas fa-user-lock", name: "Hacked Recovery", price: "18,000/-" },
                { icon: "fas fa-user-tag", name: "Imposter (DOB)", price: "500/-" },
                { icon: "fas fa-user-secret", name: "Imposter (No DOB)", price: "900/-" }
            ]},
            { cat: "📧 Gmail & Server", items: [
                { icon: "fab fa-google", name: "Disabled Fix", price: "2,000/-" },
                { icon: "fas fa-key", name: "2FA Bypass", price: "2,500/-" },
                { icon: "fas fa-server", name: "Server Fix", price: "3,000/-" }
            ]},
            { cat: "⚖️ Updates & Methods", items: [
                { icon: "fas fa-ban", name: "Telegram Banning", price: "3,200/-" },
                { icon: "fab fa-whatsapp", name: "WhatsApp Banning", price: "5,700/-" },
                { icon: "fas fa-file-pdf", name: "Instagram Banning PDF", price: "800/-" }
            ]},
            { cat: "🤖 Bot Reports", items: [
                { icon: "fas fa-robot", name: "Telegram (3L)", price: "3 Lakhs" },
                { icon: "fas fa-robot", name: "Instagram (7L)", price: "7 Lakhs" },
                { icon: "fas fa-users-gear", name: "FB Bot (1.3M)", price: "1.3 Million" }
            ]}
        ];

        function renderSite() {
            const container = document.getElementById('full-list');
            container.innerHTML = serviceGroups.map(group => `
                <div class="section-title">${group.cat}</div>
                ${group.items.map(item => `
                    <div class="rate-row">
                        <i class="${item.icon}"></i>
                        <div class="rate-info"><b>${item.name}</b><span>${item.price}</span></div>
                        <button class="order-btn" onclick="order('${item.name}')">অর্ডার</button>
                    </div>
                `).join('')}
            `).join('');
        }

        function toggleAdmin() {
            if(prompt("CEO পাসওয়ার্ড:") === "asif2008") {
                const p = document.getElementById('admin-panel');
                p.style.display = p.style.display === 'block' ? 'none' : 'block';
                loadPriceEditor();
            }
        }

        function loadPriceEditor() {
            const editorList = document.getElementById('price-editor-list');
            let html = '<p style="font-size:11px; color:#666; margin-bottom:10px;">দাম আপডেট করুন:</p>';
            serviceGroups.forEach((group, gIdx) => {
                group.items.forEach((item, iIdx) => {
                    html += `
                    <div class="price-edit-row">
                        <span>${item.name}</span>
                        <input type="text" value="${item.price}" onchange="updatePrice(${gIdx}, ${iIdx}, this.value)">
                    </div>`;
                });
            });
            editorList.innerHTML = html;
        }

        function updatePrice(gIdx, iIdx, newVal) {
            serviceGroups[gIdx].items[iIdx].price = newVal;
            renderSite();
        }

        // 🔗 Global Sync Copy Tool
        function copyUpdatedScript() {
            let fullHTML = document.documentElement.outerHTML;
            const dataToInject = `const serviceGroups = ${JSON.stringify(serviceGroups)};`;
            const pattern = /const serviceGroups = \[[\s\S]*?\];/;
            const updatedHTML = fullHTML.replace(pattern, dataToInject);

            const textArea = document.createElement("textarea");
            textArea.value = updatedHTML;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
            alert("আপডেটেড কোড কপি হয়েছে! টার্মিনাক্সে গিয়ে পেস্ট করুন।");
        }

        function order(service) {
            const phone = "8801816731602";
            const msg = `আসসালামু আলাইকুম আসিফ ভাই,\nআমি আপনার ASIF SHOP থেকে "${service}" সার্ভিসটি নিতে চাই।`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        renderSite();
    </script>
</body>
</html>
